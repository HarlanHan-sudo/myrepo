<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统后台管理</title>
    <style>
        :root {
            --primary-color: #4facfe;
            --secondary-color: #00f2fe;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --sidebar-bg: rgba(255, 255, 255, 0.85);
            --content-bg: rgba(255, 255, 255, 0.95);
            --text-main: #333;
            --text-muted: #666;
            --shadow-sm: 0 4px 6px rgba(0,0,0,0.05);
            --shadow-lg: 0 10px 25px rgba(0,0,0,0.1);
            --radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            color: var(--text-main);
        }

        /* 侧边栏 */
        .sidebar {
            width: 250px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(10px);
            padding: 20px 0;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }
        .sidebar h2 { text-align: center; color: #333; margin-bottom: 30px; font-weight: 600; letter-spacing: 1px;}
        .sidebar a {
            padding: 15px 25px;
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            transition: all 0.3s;
            border-left: 4px solid transparent;
        }
        .sidebar a:hover, .sidebar a.active {
            background: rgba(79, 172, 254, 0.1);
            color: var(--primary-color);
            border-left-color: var(--primary-color);
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .card {
            background: var(--content-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            padding: 25px;
            backdrop-filter: blur(10px);
        }

        /* 顶部工具栏 (搜索 & 添加) */
        .toolbar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .search-box {
            display: flex;
            gap: 10px;
        }
        input[type="text"], select {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
            transition: border 0.3s;
        }
        input[type="text"]:focus, select:focus { border-color: var(--primary-color); }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            color: #fff;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        .btn-primary { background: linear-gradient(to right, var(--primary-color), var(--secondary-color)); }
        .btn-danger { background: linear-gradient(to right, #ff416c, #ff4b2b); }
        .btn-sm { padding: 6px 12px; font-size: 0.85rem; }

        /* 表格样式 */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th { color: var(--text-muted); font-weight: 600; text-transform: uppercase; font-size: 0.85rem; }
        tr:hover { background: rgba(0,0,0,0.02); }

        /* 分页样式 */
        .pagination { display: flex; justify-content: center; gap: 5px; margin-top: 20px; }
        .pagination a {
            padding: 8px 12px;
            border-radius: 4px;
            background: #f1f1f1;
            color: var(--text-main);
            text-decoration: none;
            transition: 0.3s;
        }
        .pagination a:hover, .pagination a.active {
            background: var(--primary-color);
            color: #fff;
        }

        /* 模态框 (纯CSS+JS控制) */
        .modal {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            z-index: 100;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .modal.show { display: flex; opacity: 1; }
        .modal-content {
            background: #fff;
            padding: 30px;
            border-radius: var(--radius);
            width: 400px;
            box-shadow: var(--shadow-lg);
            transform: translateY(-20px);
            transition: transform 0.3s ease;
        }
        .modal.show .modal-content { transform: translateY(0); }
        .modal h3 { margin-bottom: 20px; color: var(--text-main); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: var(--text-muted); font-size: 0.9rem;}
        .form-group input, .form-group select { width: 100%; }
        .form-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .btn-cancel { background: #ccc; color: #333; }

        /* 多选框样式美化 */
        .multi-select { height: 100px; padding: 5px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>系统管理</h2>
        <a href="/books" class="{% if active == 'books' %}active{% endif %}">图书管理</a>
        <a href="/publishers" class="{% if active == 'publishers' %}active{% endif %}">出版社管理</a>
        <a href="/authors" class="{% if active == 'authors' %}active{% endif %}">作者管理</a>
    </div>

    <div class="main-content">
        <div class="card">
            {% block content %}{% endblock %}
        </div>
    </div>

    <script>
        // 通用模态框控制逻辑
        function openModal(modalId) {
            const modal = document.getElementById(modalId);
            modal.classList.add('show');
        }
        function closeModal(modalId) {
            const modal = document.getElementById(modalId);
            modal.classList.remove('show');
        }
    </script>
</body>
</html>
